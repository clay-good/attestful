{{- if .Values.secrets.create }}
{{- if not .Values.secrets.existingJwtSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "attestful.jwtSecretName" . }}
  labels:
    {{- include "attestful.labels" . | nindent 4 }}
type: Opaque
data:
  {{- if .Values.secrets.jwtSecret }}
  {{ .Values.secrets.jwtSecretKey }}: {{ .Values.secrets.jwtSecret | b64enc | quote }}
  {{- else }}
  {{ .Values.secrets.jwtSecretKey }}: {{ randAlphaNum 64 | b64enc | quote }}
  {{- end }}
{{- end }}
{{- end }}
